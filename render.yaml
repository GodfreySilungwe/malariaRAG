services:
  - type: web
    name: malaria-rag-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: "5000"
    healthCheckPath: /health
    
databases:
  - name: chromadb-data
    plan: free
