version: '3.8'

services:
  # Flask Backend API + React Frontend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: malaria-rag-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - PORT=5000
    volumes:
      - ./app.py:/app/app.py
      - ./malaria_rag.py:/app/malaria_rag.py
      - ./model.py:/app/model.py
      - ./context.py:/app/context.py
      - ./ingest.py:/app/ingest.py
      - ./frontend:/app/frontend
      - ./chromadb:/app/chromadb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: python app.py

volumes:
  chromadb:
    driver: local

networks:
  default:
    name: malaria-rag-network
